name: CI/CD Pipeline (Docker & Vercel Deployment)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggers from the GitHub Actions UI

# Set up global environment variables for Vercel CLI
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ==========================================
  # Job 1: Build & Verify Code Quality
  # ==========================================
  build-and-test:
    name: Build & Lint React App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Automated node_modules caching based on package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint
        continue-on-error: true # Ensure the build doesn't fail if there are minor formatting issues, change to false if strict quality gates are required

      - name: Run Build Check
        run: npm run build

  # ==========================================
  # Job 2: Build & Publish Docker Image
  # ==========================================
  docker-build-push:
    name: Build & Push Docker Image to GHCR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' # Only publish the Docker image on actual merges/pushes (not PRs)
    permissions:
      contents: read
      packages: write # Necessary permission to write to GitHub Packages (GHCR)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Packages (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker tags require strictly lowercase names, but GitHub repo names may contain uppercase.
      - name: Convert Repository Name to Lowercase
        id: prep
        run: |
          REPO="${{ github.repository }}"
          echo "image_name=ghcr.io/${REPO,,}" >> $GITHUB_OUTPUT

      - name: Build and Push Production Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.prep.outputs.image_name }}:latest
            ${{ steps.prep.outputs.image_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================
  # Job 3: Deploy to Vercel
  # ==========================================
  vercel-deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build-and-test
    # This job runs on both pushes (Production) and pull requests (Preview)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ------------------------------------------
      # Option A: Preview Deployment (Non-main branches / PRs)
      # ------------------------------------------
      - name: Pull Vercel Environment (Preview)
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts (Preview)
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      # ------------------------------------------
      # Option B: Production Deployment (main/master branch pushes)
      # ------------------------------------------
      - name: Pull Vercel Environment (Production)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts (Production)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
